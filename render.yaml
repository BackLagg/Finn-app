services:
  - type: keyvalue
    name: finn-redis
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (internal Render services use private network)

  - type: pserv
    name: finn-mongo
    runtime: docker
    rootDir: mongo
    dockerfilePath: Dockerfile
    disk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 10

  - type: web
    name: finn-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb://finn-mongo:27017/finn-app
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: finn-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: finn-redis
          property: port
      - key: ALLOWED_ORIGINS
        value: https://finn-frontend.onrender.com
      - key: FILE_SERVICE_URL
        value: https://finn-file-service.onrender.com
      - key: FILE_PUBLIC_URL
        value: https://finn-file-service.onrender.com
      - fromGroup: finn-bot-env
      - fromGroup: finn-file-api

  - type: web
    name: finn-file-service
    runtime: docker
    rootDir: file-service
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: finn-file-api

  - type: web
    name: finn-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        value: https://finn-backend-as35.onrender.com/api

  - type: worker
    name: finn-bot
    runtime: docker
    rootDir: Bot_API
    dockerfilePath: Dockerfile
    numInstances: 1
    envVars:
      - key: MONGO_URI
        value: mongodb://finn-mongo:27017/finn-app
      - key: DB_NAME
        value: finn-app
      - key: MINIAPP_URL
        value: https://finn-frontend.onrender.com
      - key: BOT_TOKEN
        fromService:
          type: web
          name: finn-backend
          envVarKey: BOT_TOKEN

  - type: cron
    name: finn-ping
    runtime: node
    rootDir: ping-service
    schedule: "*/14 * * * *"
    buildCommand: "true"
    startCommand: node ping.mjs
    envVars:
      - key: PING_URLS
        value: "https://finn-backend-as35.onrender.com,https://finn-file-service.onrender.com/health,https://finn-frontend.onrender.com,https://my-resume-thjr.onrender.com/"

envVarGroups:
  - name: finn-bot-env
    envVars:
      - key: BOT_TOKEN
        sync: false
  - name: finn-file-api
    envVars:
      - key: FILE_API_KEY
        generateValue: true
