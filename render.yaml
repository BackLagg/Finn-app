services:
  - type: keyvalue
    name: finn-redis
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (internal Render services use private network)

  - type: pserv
    name: finn-mongo
    runtime: docker
    rootDir: mongo
    dockerfilePath: Dockerfile
    disk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 10

  - type: web
    name: finn-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb://finn-mongo:27017/finn-app
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: finn-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: finn-redis
          property: port

  - type: web
    name: finn-file-service
    runtime: docker
    rootDir: file-service
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: finn-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile

  - type: worker
    name: finn-bot
    runtime: docker
    rootDir: Bot_API
    dockerfilePath: Dockerfile
